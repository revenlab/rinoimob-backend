spring:
  profiles:
    active: ${SPRING_PROFILE:dev}
  application:
    name: rinoimob-backend
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQL10Dialect
        format_sql: true
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/rinoimob}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres_dev}
    driver-class-name: org.postgresql.Driver

logging:
  level:
    root: INFO
    com.rinoimob: DEBUG
