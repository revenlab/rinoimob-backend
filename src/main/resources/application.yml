spring:
  profiles:
    active: ${SPRING_PROFILE:dev}
  application:
    name: rinoimob-backend
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/rinoimob}
    username: ${DB_USER:user}
    password: ${DB_PASSWORD:pass}
    driver-class-name: org.postgresql.Driver
  mail:
    host: ${MAIL_HOST:smtp.resend.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:resend}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
  api-docs:
    path: /v3/api-docs

logging:
  level:
    root: INFO
    com.rinoimob: DEBUG
    
server:
  port: ${SERVER_PORT:39000}

jwt:
  secret: ${JWT_SECRET:rinoimob-dev-secret-key-change-in-production-must-be-at-least-512-bits-long!!}
  access-token-expiration: ${JWT_ACCESS_TOKEN_EXPIRATION:900000}
  refresh-token-expiration: ${JWT_REFRESH_TOKEN_EXPIRATION:604800000}

app:
  frontend:
    url: ${FRONTEND_URL:http://localhost:5173}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:3000,http://127.0.0.1:3000}
  verification-token-expiration: ${VERIFICATION_TOKEN_EXPIRATION:86400}
  reset-token-expiration: ${RESET_TOKEN_EXPIRATION:3600}

seaweedfs:
  master:
    url: ${SEAWEEDFS_MASTER_URL:http://localhost:9333}
